services:
  mcp-server:
    image: python:3.12-slim
    working_dir: /workspace
    volumes:
      - .:/workspace
    env_file:
      - .env
    command: bash -lc "pip install -r apps/mcp_server/requirements.txt && python -m apps.mcp_server.bb8_mcp.server"
    ports:
      - "8765:8765"

  agent:
    image: python:3.12-slim
    working_dir: /workspace
    volumes:
      - .:/workspace
    env_file:
      - .env
    command: bash -lc "pip install -r apps/agent/requirements.txt && python -m apps.agent.bb8_agent.main --goal 'roll forward a little'"
    depends_on:
      - mcp-server

  ros-sim:
    profiles: ["sim"]
    build:
      context: ./sim/docker
      dockerfile: Dockerfile.ros-jazzy-gazebo
    image: bb8-stack:ros-jazzy-gazebo
    working_dir: /workspace
    volumes:
      - .:/workspace
    environment:
      ROS_DOMAIN_ID: "42"
      SIM_WORLD: ${SIM_WORLD:-/workspace/sim/worlds/bb8_room.sdf}
      GZ_SIM_RESOURCE_PATH: /workspace/sim:/workspace/sim/models:/workspace/ros_ws/src/bb8_description
    command: >
      bash -lc "
        cd /workspace/ros_ws &&
        colcon build --symlink-install &&
        source install/setup.bash &&
        printf '\n[bb8-stack] Launching Gazebo server against %s\n' \"$${SIM_WORLD}\" &&
        gz sim -s -r \"$${SIM_WORLD}\"
      "
